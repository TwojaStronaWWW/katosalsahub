name: CI Tests
on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-html:
    name: Walidacja HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Validate katosalsahub.pl HTML
        run: htmlhint "katosalsahub.pl/**/*.html" --config .htmlhintrc

      - name: Validate dancepuls.pl HTML
        run: htmlhint "dancepuls.pl/**/*.html" --config .htmlhintrc

  check-links:
    name: Sprawdzanie linków
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          echo "🔍 Sprawdzanie referencji do plików w katosalsahub.pl..."
          errors=0

          # Sprawdź czy pliki CSS/JS/obrazy wskazywane w HTML istnieją
          for html_file in katosalsahub.pl/*.html; do
            [ -f "$html_file" ] || continue
            dir=$(dirname "$html_file")

            # Wyciągnij src="" i href="" (lokalne ścieżki, nie http/# /javascript)
            grep -oP '(?:src|href)="(?!https?://|#|javascript:|mailto:|tel:)([^"]+)"' "$html_file" | \
            sed 's/.*="\(.*\)"/\1/' | \
            sed 's/?.*//' | \
            while read -r ref; do
              if [ ! -f "$dir/$ref" ] && [ ! -d "$dir/$ref" ]; then
                echo "❌ BRAK: $html_file → $ref"
                errors=$((errors + 1))
              fi
            done
          done

          echo "🔍 Sprawdzanie referencji do plików w dancepuls.pl..."
          for html_file in dancepuls.pl/*.html; do
            [ -f "$html_file" ] || continue
            dir=$(dirname "$html_file")

            grep -oP '(?:src|href)="(?!https?://|#|javascript:|mailto:|tel:)([^"]+)"' "$html_file" | \
            sed 's/.*="\(.*\)"/\1/' | \
            sed 's/?.*//' | \
            while read -r ref; do
              if [ ! -f "$dir/$ref" ] && [ ! -d "$dir/$ref" ]; then
                echo "❌ BRAK: $html_file → $ref"
                errors=$((errors + 1))
              fi
            done
          done

          echo "✅ Sprawdzanie linków zakończone"
