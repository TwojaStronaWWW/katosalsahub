name: CI + Deploy to LH
on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: 🧪 CI Testy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Walidacja HTML
        run: |
          npm install -g htmlhint
          for file in katosalsahub.pl/*.html dancepuls.pl/*.html; do
            [ -f "$file" ] || continue
            if head -5 "$file" | grep -qi 'doctype'; then
              echo "✅ Walidacja: $file"
              htmlhint "$file" --config .htmlhintrc
            else
              echo "⏭️ Pomijam partial: $file"
            fi
          done

      - name: ESLint - analiza JavaScript
        run: |
          npm install -g eslint
          npx eslint --config eslint.config.mjs \
            "katosalsahub.pl/assets/js/**/*.js" \
            "dancepuls.pl/js/**/*.js"

      - name: Sprawdzanie linków
        run: |
          ERRORS=0
          for dir in katosalsahub.pl dancepuls.pl; do
            echo "🔍 Sprawdzanie referencji w $dir..."
            for html_file in $dir/*.html; do
              [ -f "$html_file" ] || continue
              base=$(dirname "$html_file")
              grep -oP '(?:src|href)="(?!https?://|#|javascript:|mailto:|tel:)([^"]+)"' "$html_file" | \
              sed 's/.*="\(.*\)"/\1/' | sed 's/?.*//' | \
              while read -r ref; do
                if [ ! -f "$base/$ref" ] && [ ! -d "$base/$ref" ]; then
                  echo "❌ BRAK: $html_file → $ref"
                  ERRORS=$((ERRORS+1))
                fi
              done
            done
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Znaleziono $ERRORS brakujących referencji!"
            exit 1
          fi
          echo "✅ Sprawdzanie linków zakończone"

  backup:
    name: 💾 Backup produkcji
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      MAIN_PATH: ${{ github.ref_name == 'main' && 'katosalsahub.pl' || 'staging.katosalsahub.pl' }}
      DANCE_PATH: ${{ github.ref_name == 'main' && 'dancepuls.katosalsahub.pl' || 'staging.katosalsahub.pl/dancepuls' }}
    steps:
      - name: Pobierz aktualną wersję z serwera
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1
          mkdir -p backup/katosalsahub backup/dancepuls
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -p 40022 \
            sftp://${{ secrets.FTP_SERVER }} \
            -e "
              set net:timeout 60;
              set sftp:auto-confirm yes;
              mirror --verbose /home/platne/serwer417204/public_html/${{ env.MAIN_PATH }} ./backup/katosalsahub;
              mirror --verbose /home/platne/serwer417204/public_html/${{ env.DANCE_PATH }} ./backup/dancepuls;
              quit
            "

      - name: Zapisz backup jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.ref_name }}-${{ github.run_number }}
          path: backup/
          retention-days: 7

  deploy:
    name: 🚀 Deploy na serwer (${{ github.ref_name }})
    needs: backup
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      MAIN_PATH: ${{ github.ref_name == 'main' && 'katosalsahub.pl' || 'staging.katosalsahub.pl' }}
      DANCE_PATH: ${{ github.ref_name == 'main' && 'dancepuls.katosalsahub.pl' || 'staging.katosalsahub.pl/dancepuls' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload via SFTP
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -p 40022 \
            sftp://${{ secrets.FTP_SERVER }} \
            -e "
              set net:timeout 60;
              set sftp:auto-confirm yes;
              mirror -R --verbose ./katosalsahub.pl /home/platne/serwer417204/public_html/${{ env.MAIN_PATH }};
              mirror -R --verbose ./dancepuls.pl /home/platne/serwer417204/public_html/${{ env.DANCE_PATH }};
              quit
            "
